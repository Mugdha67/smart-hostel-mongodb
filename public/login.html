<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Hostel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="fas fa-building"></i>
                <span>SmartHostel</span>
            </div>
            <div class="nav-actions">
                <ul class="nav-menu">
                    <li><a href="/">Home</a></li>
                    <li><a href="/login" class="active">Login</a></li>
                    <li><a href="/register">Register</a></li>
                </ul>
                <button id="themeToggle" class="icon-btn" type="button" aria-pressed="false">
                    <i class="fas fa-moon"></i><span class="sr-only">Toggle theme</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Login to Your Account</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        Username
                    </label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>
            <p class="auth-link">Don't have an account? <a href="/register">Register here</a></p>
            <div id="errorMessage" class="error-message"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Smart Hostel Management System. All rights reserved.</p>
    </footer>

    <script src="/js/ui.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
