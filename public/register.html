<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Hostel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="fas fa-building"></i>
                <span>SmartHostel</span>
            </div>
            <div class="nav-actions">
                <ul class="nav-menu">
                    <li><a href="/">Home</a></li>
                    <li><a href="/login">Login</a></li>
                    <li><a href="/register" class="active">Register</a></li>
                </ul>
                <button id="themeToggle" class="icon-btn" type="button" aria-pressed="false">
                    <i class="fas fa-moon"></i><span class="sr-only">Toggle theme</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Create New Account</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        Username *
                    </label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password *
                    </label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="full_name">
                        <i class="fas fa-user-circle"></i>
                        Full Name
                    </label>
                    <input type="text" id="full_name" name="full_name">
                </div>
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" id="email" name="email">
                </div>
                <div class="form-group">
                    <label for="phone">
                        <i class="fas fa-phone"></i>
                        Phone
                    </label>
                    <input type="tel" id="phone" name="phone">
                </div>
                <div class="form-group">
                    <label for="hostel_id">
                        <i class="fas fa-home"></i>
                        Select Hostel *
                    </label>
                    <select id="hostel_id" name="hostel_id" required>
                        <option value="">Select a hostel...</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </form>
            <p class="auth-link">Already have an account? <a href="/login">Login here</a></p>
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Smart Hostel Management System. All rights reserved.</p>
    </footer>

    <script src="/js/ui.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
